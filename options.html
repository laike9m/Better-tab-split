<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Better Tab Split Options</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #202124;
      padding: 20px 24px;
      min-width: 360px;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #202124;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .option-label {
      flex: 1;
    }

    .option-label .title {
      font-size: 14px;
      font-weight: 500;
      color: #202124;
    }

    .option-label .desc {
      font-size: 12px;
      color: #5f6368;
      margin-top: 2px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #dadce0;
      border-radius: 10px;
      transition: background-color 0.2s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .toggle input:checked + .slider {
      background-color: #1a73e8;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }

    .status {
      font-size: 12px;
      color: #5f6368;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h2>Better Tab Split</h2>
  <div class="option-row">
    <div class="option-label">
      <div class="title">Auto-activate when entering Split View</div>
      <div class="desc">进入分屏时自动激活</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="autoActivate">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status">✓ 已保存 / Saved</div>
  <script src="options.js"></script>
</body>
</html>
